{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Registro de Auditoría</h2>

    <hr>

    <!-- Tabla de auditoría -->
    <table class="table table-striped table-hover">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Acción</th>
                <th>Módulo</th>
                <th>Fecha</th>
            </tr>
        </thead>

        <tbody>
            {% for item in datos %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.usuario }}</td>
                <td>{{ item.accion }}</td>
                <td>{{ item.modulo }}</td>
                <td>{{ item.fecha|date:"Y-m-d H:i:s" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">
                    No hay registros de auditoría
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}

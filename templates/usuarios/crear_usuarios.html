{% extends 'base.html' %}
{% load static %}

{% block title %}Crear Usuario{% endblock %}

{% block content %}

<h1>Crear Usuario</h1>

<a href="{% url 'usuarios' %}" class="back">Volver</a>
<form method="POST">
    {% csrf_token %}
    {{ form.errors }}
    {{ form.as_p }}

    <button type="submit">Guardar</button>
</form>

{% endblock %}

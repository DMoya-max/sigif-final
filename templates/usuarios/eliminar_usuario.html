<!DOCTYPE html>
{% extends 'base.html' %}
<html>
<head>
    <title>Eliminar Usuario</title>
</head>
<body>
    <h1>¿Eliminar usuario?</h1>

    <p>¿Seguro que quieres eliminar a "{{ users }}"?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <br>
    <a href="{% url 'usuarios' %}">Cancelar</a>
</body>
</html>
